appId: com.aionx.lcms
productName: LCMS
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
extraResources:
  - resources/icon.png
extraMetadata:
  main: out/main/index.js
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.business
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Office
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: AionX-IT-Solutions
  repo: concepcion-lcms
  private: false
