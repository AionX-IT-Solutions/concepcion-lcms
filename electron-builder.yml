appId: com.aionx.lcms
productName: LCMS
copyright: Copyright © 2026 Edwin A. Concepcion, Jr. Law Office
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
# Single square source icon — electron-builder generates the .ico (Windows)
# and .icns (macOS, all Retina sizes up to 1024x1024) from this at build
# time, so both platforms stay in sync automatically. Source is currently
# 256x256; swap in a 1024x1024 PNG here if the macOS Dock/Finder icon looks
# soft at large sizes.
icon: resources/icon.png
extraResources:
  - resources/icon.png
extraMetadata:
  main: out/main/index.js
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.business
  # No Apple Developer ID certificate configured yet, so skip code signing
  # entirely instead of letting electron-builder search the keychain for one.
  # Unsigned DMGs will trigger a Gatekeeper warning on first launch — users
  # can right-click the app > Open to bypass it. See the "code signing" note
  # in the build guide if you get a paid Apple Developer account later.
  identity: null
dmg:
  artifactName: ${name}-${version}.${ext}
  contents:
    - type: file
      x: 140
      y: 220
    - type: link
      path: /Applications
      x: 420
      y: 220
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Office
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: AionX-IT-Solutions
  repo: concepcion-lcms
  private: false
